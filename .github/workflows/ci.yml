name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ── Type check ──────────────────────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Check TypeScript
        run: npx tsc --noEmit

  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Format check ────────────────────────────────────────────────────────────
  # Verifies all files match .prettierrc rules.
  # Developers should run the pre-commit hook locally to avoid hitting this —
  # see "Development setup" in README.md.
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Check formatting
        run: npm run format:check

  # ── Unit tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests
        run: npm run test:run

  # ── Build ───────────────────────────────────────────────────────────────────
  # Runs last — only worth building if all checks above pass.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [type-check, lint, format-check, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Next.js build
        run: npm run build
